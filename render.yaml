services:
  - type: web
    name: reel-backend
    runtime: python
    rootDir: reel-backend
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: TMDB_API_KEY
        sync: false          # Set manually in Render dashboard — never commit this
      - key: SECRET_KEY
        generateValue: true  # Render auto-generates a secure random value
      - key: DATABASE_URL
        fromDatabase:
          name: reel-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        sync: false          # Set to your Vercel URL once deployed

databases:
  - name: reel-db
    databaseName: reel
    plan: free
